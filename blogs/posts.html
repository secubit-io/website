<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — Secubit</title>
<meta name="description" content="">
<link rel="icon" href="../logo_favicon.png" type="image/png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../styles.css">
<script src="/components.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
</head>
<body>
<div id="page">

<!-- ── Nav (shared, injected by components.js) ── -->
<div id="site-nav"></div>

<!-- Post header (built from the .md front matter) -->
<header class="post-hero" id="md-hero"></header>

<!-- Rendered markdown body (references section is inserted right after this) -->
<article id="md-rendered" class="article md-rendered">Loading…</article>

<!-- ── CTA (shared, injected by components.js) ── -->
<div id="site-post-cta"></div>

<!-- ── Footer (shared, injected by components.js) ── -->
<div id="site-footer"></div>

</div>

<script>
(function () {
  const slug = new URLSearchParams(location.search).get('post') || '';
  const out = document.getElementById('md-rendered');
  const hero = document.getElementById('md-hero');

  const esc = s => s.replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
  const MONTHS = ['January', 'February', 'March', 'April', 'May', 'June', 'July',
                  'August', 'September', 'October', 'November', 'December'];
  const fmtDate = d => { const m = /^(\d{4})-(\d{2})/.exec(d || ''); return m ? MONTHS[+m[2] - 1] + ' ' + m[1] : (d || ''); };

  // Validate slug to keep the fetch path safe.
  if (!/^[a-z0-9-]+$/.test(slug)) {
    out.textContent = 'Post not found. Use ?post=<slug>.';
    return;
  }

  fetch('/blogs/posts/' + slug + '.md')
    .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
    .then(text => {
      // Parse the YAML front matter.
      const fm = {};
      const fmMatch = text.match(/^---\n([\s\S]*?)\n---\n+/);
      if (fmMatch) {
        fmMatch[1].split('\n').forEach(line => {
          const i = line.indexOf(':');
          if (i > 0) fm[line.slice(0, i).trim()] = line.slice(i + 1).trim().replace(/^["'](.*)["']$/, '$1');
        });
      }
      const body = text.replace(/^---\n[\s\S]*?\n---\n+/, '');
      const author = fm.author || 'Secubit Team';

      // Build the post header.
      hero.innerHTML =
        '<a href="/blogs/" class="back-link">← Back to Blog</a>' +
        '<div class="tag-row">' +
          (fm.tag ? '<span class="tag">' + esc(fm.tag) + '</span>' : '') +
          (fm.read_time ? '<span class="meta">' + esc(fm.read_time) + '</span>' : '') +
        '</div>' +
        '<h1>' + esc(fm.title || slug) + '</h1>' +
        '<div class="byline">' +
          '<div class="avatar">' + esc(author.trim().charAt(0)) + '</div>' +
          '<div><div class="who">' + esc(author) + '</div>' +
          '<div class="when">' + esc(fmtDate(fm.date)) + '</div></div>' +
        '</div>';

      // Render the markdown body, then add the post styling classes.
      out.innerHTML = marked.parse(body);

      const firstP = out.querySelector('p');
      if (firstP) firstP.classList.add('lead');

      out.querySelectorAll('table').forEach(t => {
        t.classList.add('cmp');
        // Make the first cell of each body row a bold row-header.
        t.querySelectorAll('tbody tr').forEach(tr => {
          const first = tr.querySelector('td');
          if (first) { const th = document.createElement('th'); th.innerHTML = first.innerHTML; first.replaceWith(th); }
        });
        const wrap = document.createElement('div');
        wrap.className = 'table-scroll';
        t.parentNode.insertBefore(wrap, t);
        wrap.appendChild(t);
      });

      out.querySelectorAll('p').forEach(p => {
        if (/^best fit:/i.test(p.textContent.trim())) p.classList.add('bestfit');
      });

      // Move the References heading + everything after it into a sibling .references section
      // so it spans the same width as the rest of the page.
      const refH = [...out.querySelectorAll('h2')].find(h => /^references$/i.test(h.textContent.trim()));
      if (refH) {
        const sec = document.createElement('section');
        sec.className = 'references';
        sec.innerHTML = '<hr style="border:none;border-top:1px solid var(--border);margin-bottom:36px;">';
        let n = refH;
        while (n) { const next = n.nextElementSibling; sec.appendChild(n); n = next; }
        out.insertAdjacentElement('afterend', sec);
        const disc = sec.querySelector('blockquote');
        if (disc) disc.classList.add('disclaimer');
      }

      // Metadata for the tab/SEO.
      if (fm.title) document.title = fm.title + ' — Secubit Blog';
      if (fm.excerpt) {
        const meta = document.querySelector('meta[name="description"]');
        if (meta) meta.setAttribute('content', fm.excerpt);
      }
    })
    .catch(() => {
      hero.innerHTML = '<a href="/blogs/" class="back-link">← Back to Blog</a>';
      out.textContent = 'Post not found: "' + slug + '".';
    });
})();
</script>
</body>
</html>
